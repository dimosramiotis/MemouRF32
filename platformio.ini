; PlatformIO project for TTGO LoRa32 v2.1 - RF clone & replay with HomeKit
; Uses pioarduino fork for Arduino-ESP32 3.x (required by HomeSpan)

[env:ttgo-lora32-v21]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = ttgo-lora32-v21
framework = arduino

; Use "no OTA" partition: ~3.8 MB app + 256 KB SPIFFS (no OTA partition)
board_build.partitions = no_ota.csv

monitor_speed = 115200

build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
  jgromes/RadioLib
  HomeSpan/HomeSpan
  bblanchon/ArduinoJson
  https://github.com/tzapu/WiFiManager.git

upload_speed = 460800
